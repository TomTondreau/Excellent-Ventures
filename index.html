<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tom & Friends Excellent Ventures 🎸</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #000005;
            --text-color: #e0fbfc;
            --neon-cyan: #00ffff;
            --neon-orange: #ff7700;
            --neon-yellow: #ffff00;
            --glow-cyan: 0 0 10px #00ffff, 0 0 20px #00ffff;
            --glow-orange: 0 0 10px #ff7700, 0 0 20px #ff7700;
            --glow-yellow: 0 0 10px #ffff00, 0 0 20px #ffff00;
            --font-main: 'Rajdhani', sans-serif;
            --font-tech: 'Orbitron', sans-serif;
            --font-retro: 'Press Start 2P', cursive;
        }

        /* --- CURSOR PERSONALIZADO: FÓSFORO APAGADO --- */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; outline: none; 
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><line x1="8" y1="8" x2="24" y2="24" stroke="%23d4a373" stroke-width="4" stroke-linecap="round"/><circle cx="6" cy="6" r="4" fill="%238b0000"/></svg>') 6 6, auto !important;
        }
        
        /* --- CURSOR PERSONALIZADO: FÓSFORO ENCENDIDO AL HACER CLIC --- */
        body.clicking * {
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><path d="M6 0 C2 3 4 8 6 10 C8 8 10 3 6 0 Z" fill="%23ff7700"/><path d="M6 3 C4 5 5 8 6 9 C7 8 8 5 6 3 Z" fill="%23ffff00"/><line x1="8" y1="10" x2="24" y2="26" stroke="%23d4a373" stroke-width="4" stroke-linecap="round"/><circle cx="6" cy="8" r="3" fill="%23222"/></svg>') 6 6, auto !important;
        }

        html { scroll-behavior: smooth; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            overflow-x: hidden;
            letter-spacing: 1px;
        }

        /* --- CAPA FIJA PARA TU IMAGEN PNG --- */
        .backdrop-poster {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: url('fondo.png') no-repeat center 60%; 
            background-size: contain; 
            z-index: -2;
            opacity: 0.85; /* Subido de 0.45 a 0.85 para que sea claramente visible */
            mix-blend-mode: normal; /* Cambiado a normal para evitar que el screen lave los colores contra el negro */
            pointer-events: none;
            transform-origin: center center;
        }

        /* Clase activa para ejecutar la animación de intro */
        .run-intro {
            animation: oldschoolIntro 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* --- ANIMACIÓN: ZOOM IN ROTATIVO RETRO --- */
        @keyframes oldschoolIntro {
            0% {
                transform: scale(0.1) rotate(-180deg);
                opacity: 0;
            }
            70% {
                transform: scale(1.05) rotate(5deg);
                opacity: 0.8;
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 0.85; /* Consistente con el estilo base */
            }
        }

        /* Scanlines CRT */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            z-index: 9999;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            opacity: 0.4;
        }

        #warp-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.85;
        }

        header {
            background: rgba(0, 0, 10, 0.85);
            border-bottom: 2px solid var(--neon-cyan);
            box-shadow: var(--glow-cyan);
            padding: 1rem 2rem;
            position: fixed;
            top: 0; width: 100%;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .brand {
            font-family: var(--font-tech);
            color: var(--neon-cyan);
            text-transform: uppercase;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: var(--glow-cyan);
        }

        /* Gatillo interactivo para el menú */
        #trigger-friends {
            color: var(--neon-orange);
            text-shadow: var(--glow-orange);
            cursor: pointer;
            padding: 0 6px;
            display: inline-block;
            transition: all 0.2s ease;
            position: relative;
            z-index: 1010; /* Asegura prioridad de clic sobre el header */
        }
        #trigger-friends:hover {
            color: var(--neon-yellow);
            text-shadow: var(--glow-yellow);
        }

        header nav a {
            color: var(--text-color);
            text-decoration: none;
            margin-left: 20px;
            font-family: var(--font-main);
            font-weight: 500;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        header nav a:hover {
            color: var(--neon-yellow);
            text-shadow: var(--glow-yellow);
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 2rem;
            margin-top: 60px;
        }

        .main-title-container {
            transform: rotate(-1deg);
            margin-bottom: 2rem;
        }

        .main-title-top {
            font-family: var(--font-retro);
            font-size: 1.4rem;
            color: var(--neon-cyan);
            text-shadow: var(--glow-cyan);
            margin-bottom: 0.2rem;
        }

        .main-title-middle {
            font-family: var(--font-tech);
            font-size: 4.5rem;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--neon-orange);
            text-shadow: 3px 3px 0px var(--neon-cyan), var(--glow-orange);
            transform: skewX(-10deg);
            line-height: 0.9;
            letter-spacing: 2px;
        }

        .main-title-bottom {
            font-family: var(--font-tech);
            font-size: 2.8rem;
            font-weight: 300;
            text-transform: lowercase;
            color: var(--neon-yellow);
            text-shadow: var(--glow-yellow);
            letter-spacing: 4px;
            margin-top: 0.3rem;
        }

        .hero p {
            font-size: 1.4rem;
            max-width: 750px;
            font-weight: 300;
            color: #ffffff;
            background: rgba(0, 0, 5, 0.8);
            padding: 1.5rem;
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0px 0px 20px rgba(0,0,0,0.8);
            backdrop-filter: blur(2px);
        }

        .section {
            max-width: 1000px;
            margin: 0 auto;
            padding: 6rem 2rem;
        }

        h2 {
            font-family: var(--font-tech);
            font-size: 2.5rem;
            text-transform: uppercase;
            color: var(--neon-cyan);
            text-shadow: var(--glow-cyan);
            border-bottom: 1px solid var(--neon-cyan);
            padding-bottom: 1rem;
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
        }

        h2 span { font-size: 1rem; margin-left: 1rem; opacity: 0.7; font-family: var(--font-retro);}

        .ventures-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .venture-card {
            background: rgba(0, 0, 15, 0.85);
            border: 2px solid #222;
            padding: 2rem;
            transition: all 0.4s ease;
            backdrop-filter: blur(3px);
        }

        .venture-card:hover {
            border-color: var(--neon-orange);
            box-shadow: var(--glow-orange);
            transform: translateY(-5px);
        }

        .venture-card h3 {
            font-family: var(--font-tech);
            color: var(--neon-orange);
            font-size: 1.5rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .founder-panel {
            background: rgba(0, 0, 5, 0.9);
            border: 2px solid var(--neon-yellow);
            box-shadow: var(--glow-yellow);
            padding: 3rem;
            font-size: 1.2rem;
            line-height: 1.8;
            position: relative;
            backdrop-filter: blur(3px);
        }

        .founder-panel::after {
            content: 'BIOMETRIC ID: T. TONDREAU';
            position: absolute;
            bottom: 10px; right: 15px;
            font-family: var(--font-retro);
            font-size: 0.6rem;
            color: var(--neon-yellow);
            opacity: 0.5;
        }

        .founder-panel ul { margin-left: 20px; margin-bottom: 1.5rem; list-style-type: square; color: var(--neon-orange); }
        .founder-panel li span { color: var(--text-color); }

        footer {
            text-align: center;
            padding: 2rem;
            font-family: var(--font-retro);
            font-size: 0.8rem;
            color: #444;
            border-top: 1px solid #111;
            background: rgba(0,0,0,0.9);
        }

        @media (max-width: 768px) {
            .main-title-top { font-size: 0.9rem; }
            .main-title-middle { font-size: 2.8rem; }
            .main-title-bottom { font-size: 1.8rem; }
            header { flex-direction: column; padding: 1rem; }
            header nav { margin-top: 1rem; }
        }
    </style>
</head>
<body>

    <div id="poster" class="backdrop-poster run-intro"></div>

    <canvas id="warp-canvas"></canvas>

    <header>
        <div class="brand">Tom & <span id="trigger-friends">Friends</span> / Excellent Ventures 🎸</div>
        <nav>
            <a href="#aventuras">Ventures</a>
            <a href="#el-cerebro">Founder</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="main-title-container">
                <div class="main-title-top">Tom & Friends</div>
                <div class="main-title-middle">Excellent</div>
                <div class="main-title-bottom">ventures</div>
            </div>
            <p>Estrategia, diseño y fuego.
