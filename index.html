<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tom & Friends Excellent Ventures 🎸</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000005; --text-color: #e0fbfc; --neon-cyan: #00ffff; --neon-orange: #ff7700; --neon-yellow: #ffff00;
            --glow-cyan: 0 0 10px #00ffff, 0 0 20px #00ffff; --glow-orange: 0 0 10px #ff7700, 0 0 20px #ff7700;
            --font-main: 'Rajdhani', sans-serif; --font-tech: 'Orbitron', sans-serif; --font-retro: 'Press Start 2P', cursive;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><line x1="8" y1="8" x2="24" y2="24" stroke="%23d4a373" stroke-width="4" stroke-linecap="round"/><circle cx="6" cy="6" r="4" fill="%238b0000"/></svg>') 6 6, auto !important; }
        body.clicking * { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><path d="M6 0 C2 3 4 8 6 10 C8 8 10 3 6 0 Z" fill="%23ff7700"/><path d="M6 3 C4 5 5 8 6 9 C7 8 8 5 6 3 Z" fill="%23ffff00"/><line x1="8" y1="10" x2="24" y2="26" stroke="%23d4a373" stroke-width="4" stroke-linecap="round"/><circle cx="6" cy="8" r="3" fill="%23222"/></svg>') 6 6, auto !important; }
        html { scroll-behavior: smooth; background-color: var(--bg-color); }
        body { color: var(--text-color); font-family: var(--font-main); overflow-x: hidden; letter-spacing: 1px; }
        
        .backdrop-poster {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('fondo.png') no-repeat center 60%; background-size: contain;
            z-index: -3; opacity: 0.8; transform-origin: center center;
        }
        .run-intro { animation: oldschoolIntro 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes oldschoolIntro {
            0% { transform: scale(0.1) rotate(-180deg); opacity: 0; }
            70% { transform: scale(1.05) rotate(5deg); opacity: 0.7; }
            100% { transform: scale(1) rotate(0deg); opacity: 0.8; }
        }
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            z-index: 9999; background-size: 100% 4px, 3px 100%; pointer-events: none; opacity: 0.4;
        }
        #warp-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; opacity: 0.85; pointer-events: none; }
